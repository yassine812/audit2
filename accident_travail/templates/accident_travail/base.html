{% extends 'base_global.html' %}
{% load static at_tags %}

{% block extra_css %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@ttskch/select2-bootstrap4-theme@1.5.2/dist/select2-bootstrap4.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@sweetalert2/theme-bootstrap-4/bootstrap-4.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/2.1.4/toastr.min.css">
<style>
  .statut-badge { font-size:.75rem; padding:3px 10px; border-radius:12px; font-weight:600; }
  .step-wizard { display:flex; justify-content:space-between; margin-bottom:1.5rem; }
  .step-wizard .step { flex:1; text-align:center; padding:.5rem; border-bottom:3px solid #dee2e6; color:#6c757d; }
  .step-wizard .step.active { border-bottom-color:#007bff; color:#007bff; font-weight:700; }
  .step-wizard .step.done  { border-bottom-color:#28a745; color:#28a745; }
  .question-card { margin-bottom:.75rem; }
  .question-card .card-header { padding:.5rem .75rem; font-size:.875rem; }
  .btn-na,.btn-oui,.btn-non { font-weight:700; letter-spacing:.05em; }
  .fab { position:fixed; bottom:1.5rem; right:1.5rem; z-index:1050; border-radius:50%; width:56px; height:56px; display:flex; align-items:center; justify-content:center; box-shadow:0 4px 12px rgba(0,0,0,.3); }
  @media(min-width:768px){ .fab{ display:none; } }
  .custom-control { padding-left:1.75rem; min-height:1.5rem; align-items:center; }
  .custom-control-input { position:absolute; left:0; top:50%; transform:translateY(-50%); z-index:1; width:1rem; height:1rem; }
  .custom-control-label { position:relative; cursor:pointer; padding-left:.25rem; line-height:1.5; vertical-align:middle; }
  .custom-control-label::before,.custom-control-label::after { top:50%; transform:translateY(-50%); left:-1.75rem; width:1rem; height:1rem; }
  .form-control,select.form-control { height:calc(1.5em + .75rem + 2px); }
  textarea.form-control { height:auto; }
  .sous-question { margin-left:1.5rem; border-left:3px solid #007bff; padding-left:.75rem; }
  /* Filter sidebar */
  .filter-sidebar-panel { position:fixed; top:0; right:-380px; width:340px; height:100vh; background:#fff; z-index:1055; overflow-y:auto; transition:right .3s ease; box-shadow:-6px 0 24px rgba(0,0,0,.18); display:flex; flex-direction:column; }
  .filter-sidebar-panel.open { right:0; }
  .filter-sidebar-backdrop { display:none; position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:1050; }
  .filter-sidebar-backdrop.open { display:block; }
  .filter-sidebar-header { display:flex; justify-content:space-between; align-items:center; padding:1rem 1.25rem; background:#343a40; color:#fff; font-size:1rem; font-weight:600; flex-shrink:0; }
  .filter-sidebar-body { flex:1; overflow-y:auto; padding:1.25rem; }
  .filter-sidebar-inner { display:flex; flex-direction:column; height:100%; }
  .filter-group { margin-bottom:1.25rem; }
  .filter-label { display:block; font-size:.8rem; font-weight:700; text-transform:uppercase; letter-spacing:.04em; color:#6c757d; margin-bottom:.4rem; }
  .filter-actions { padding-top:.5rem; border-top:1px solid #dee2e6; margin-top:1rem; }
  /* Bouton fixe filtre */
  .at-filter-btn-fixed { position:fixed; right:16px; top:50%; transform:translateY(-50%); z-index:1060; width:46px; height:46px; border-radius:50%; display:flex; align-items:center; justify-content:center; background:#6c757d; color:#fff; box-shadow:0 4px 14px rgba(0,0,0,.3); border:none; cursor:pointer; transition:transform .2s; }
  .at-filter-btn-fixed:hover { transform:translateY(-50%) scale(1.08); background:#5a6268; }
  .at-filter-badge { position:absolute; top:3px; right:3px; width:10px; height:10px; border-radius:50%; background:#ffc107; border:2px solid #fff; }
</style>
{% endblock %}

{% block extra_js %}
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.all.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/2.1.4/toastr.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@2.9.4/dist/Chart.min.js"></script>
<script>
  function getCookie(name) {
    let v=null;
    if(document.cookie&&document.cookie!==''){
      document.cookie.split(';').forEach(function(c){ c=c.trim(); if(c.substring(0,name.length+1)===(name+'=')) v=decodeURIComponent(c.substring(name.length+1)); });
    }
    return v;
  }
  toastr.options={ positionClass:'toast-top-right', timeOut:3000 };

  // Fix Bootstrap custom-control classes
  (function fixCustomControls(root){
    var sel='.custom-control input[type="radio"],.custom-control input[type="checkbox"]';
    (root||document).querySelectorAll(sel).forEach(function(el){ if(!el.classList.contains('custom-control-input')) el.classList.add('custom-control-input'); });
    new MutationObserver(function(m){ m.forEach(function(mut){ mut.addedNodes.forEach(function(n){ if(n.nodeType===1) fixCustomControls(n); }); }); }).observe(document.body,{childList:true,subtree:true});
  })();

  // Filter Sidebar
  document.addEventListener('DOMContentLoaded',function(){
    var sidebar=document.querySelector('.js-filter-sidebar');
    var backdrop=document.querySelector('.js-filter-backdrop');
    var closeBtn=document.querySelector('.js-filter-close');
    function openSidebar(){ if(sidebar){sidebar.classList.add('open'); if(backdrop)backdrop.classList.add('open');} }
    function closeSidebar(){ if(sidebar){sidebar.classList.remove('open'); if(backdrop)backdrop.classList.remove('open');} }

    if(sidebar){
      // Bouton fixe droite
      var fixedBtn=document.createElement('button');
      fixedBtn.className='at-filter-btn-fixed';
      fixedBtn.title='Filtres';
      fixedBtn.innerHTML='<i class="fas fa-filter"></i>';
      var p=new URLSearchParams(window.location.search);
      if(p.get('q')||p.get('statut')||p.get('type_accident')||p.get('section')||p.get('societe')){
        var badge=document.createElement('span'); badge.className='at-filter-badge'; fixedBtn.appendChild(badge);
        openSidebar();
      }
      fixedBtn.addEventListener('click',openSidebar);
      document.body.appendChild(fixedBtn);
    }

    if(closeBtn) closeBtn.addEventListener('click',closeSidebar);
    if(backdrop) backdrop.addEventListener('click',closeSidebar);
    // Wire any inline toggle buttons too
    document.querySelectorAll('.js-filter-toggle').forEach(function(el){ el.addEventListener('click',openSidebar); });
  });
</script>
{% endblock %}
