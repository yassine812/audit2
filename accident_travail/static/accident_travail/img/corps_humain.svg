<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 280" width="460" height="280" style="font-family:Arial,sans-serif">
  <!-- ═══════════════════════════════════════════════════ -->
  <!--  Corps humain — Vue de face (gauche) + Vue de dos  -->
  <!-- ═══════════════════════════════════════════════════ -->

  <!-- ── Vue de face ── -->
  <g id="face" transform="translate(30,10)">
    <!-- Tête -->
    <ellipse cx="100" cy="28" rx="22" ry="26" fill="none" stroke="#333" stroke-width="1.8"/>
    <!-- Cou -->
    <rect x="91" y="53" width="18" height="16" rx="3" fill="none" stroke="#333" stroke-width="1.8"/>
    <!-- Torse -->
    <path d="M60,69 Q57,72 55,100 L55,160 L145,160 L145,100 Q143,72 140,69 Z" fill="none" stroke="#333" stroke-width="1.8"/>
    <!-- Epaules -->
    <line x1="60" y1="69" x2="48" y2="82" stroke="#333" stroke-width="1.8"/>
    <line x1="140" y1="69" x2="152" y2="82" stroke="#333" stroke-width="1.8"/>
    <!-- Bras gauche (D pour le sujet = à droite du dessin vue face) -->
    <path d="M48,82 Q44,100 42,130 Q40,148 44,164" fill="none" stroke="#333" stroke-width="1.8"/>
    <!-- Avant-bras gauche -->
    <path d="M44,164 Q42,180 43,198" fill="none" stroke="#333" stroke-width="1.8"/>
    <!-- Main gauche -->
    <ellipse cx="43" cy="204" rx="7" ry="9" fill="none" stroke="#333" stroke-width="1.5"/>
    <!-- Bras droit (G pour le sujet = à gauche du dessin vue face) -->
    <path d="M152,82 Q156,100 158,130 Q160,148 156,164" fill="none" stroke="#333" stroke-width="1.8"/>
    <!-- Avant-bras droit -->
    <path d="M156,164 Q158,180 157,198" fill="none" stroke="#333" stroke-width="1.8"/>
    <!-- Main droite -->
    <ellipse cx="157" cy="204" rx="7" ry="9" fill="none" stroke="#333" stroke-width="1.5"/>
    <!-- Hanches -->
    <path d="M55,160 Q55,170 60,175 L88,178 L88,180 L112,180 L112,178 L140,175 Q145,170 145,160" fill="none" stroke="#333" stroke-width="1.8"/>
    <!-- Jambe gauche (D) -->
    <path d="M88,180 Q86,210 85,240" fill="none" stroke="#333" stroke-width="1.8"/>
    <path d="M85,240 Q84,256 83,268" fill="none" stroke="#333" stroke-width="1.8"/>
    <!-- Pied gauche -->
    <path d="M83,268 Q79,272 72,273 Q68,273 67,271" fill="none" stroke="#333" stroke-width="1.8"/>
    <!-- Jambe droite (G) -->
    <path d="M112,180 Q114,210 115,240" fill="none" stroke="#333" stroke-width="1.8"/>
    <path d="M115,240 Q116,256 117,268" fill="none" stroke="#333" stroke-width="1.8"/>
    <!-- Pied droit -->
    <path d="M117,268 Q121,272 128,273 Q132,273 133,271" fill="none" stroke="#333" stroke-width="1.8"/>
    <!-- Labels D et G -->
    <text x="30" y="282" font-size="13" font-weight="bold" fill="#333">D</text>
    <text x="163" y="282" font-size="13" font-weight="bold" fill="#333">G</text>
  </g>

  <!-- ── Vue de dos ── -->
  <g id="dos" transform="translate(250,10)">
    <!-- Tête -->
    <ellipse cx="100" cy="28" rx="22" ry="26" fill="none" stroke="#333" stroke-width="1.8"/>
    <!-- Cou -->
    <rect x="91" y="53" width="18" height="16" rx="3" fill="none" stroke="#333" stroke-width="1.8"/>
    <!-- Torse -->
    <path d="M60,69 Q57,72 55,100 L55,160 L145,160 L145,100 Q143,72 140,69 Z" fill="none" stroke="#333" stroke-width="1.8"/>
    <!-- Colonne vertébrale (ligne centrale dos) -->
    <line x1="100" y1="69" x2="100" y2="160" stroke="#ccc" stroke-width="1" stroke-dasharray="3,3"/>
    <!-- Epaules -->
    <line x1="60" y1="69" x2="48" y2="82" stroke="#333" stroke-width="1.8"/>
    <line x1="140" y1="69" x2="152" y2="82" stroke="#333" stroke-width="1.8"/>
    <!-- Bras (vue dos = inversé D/G) -->
    <path d="M48,82 Q44,100 42,130 Q40,148 44,164" fill="none" stroke="#333" stroke-width="1.8"/>
    <path d="M44,164 Q42,180 43,198" fill="none" stroke="#333" stroke-width="1.8"/>
    <ellipse cx="43" cy="204" rx="7" ry="9" fill="none" stroke="#333" stroke-width="1.5"/>
    <path d="M152,82 Q156,100 158,130 Q160,148 156,164" fill="none" stroke="#333" stroke-width="1.8"/>
    <path d="M156,164 Q158,180 157,198" fill="none" stroke="#333" stroke-width="1.8"/>
    <ellipse cx="157" cy="204" rx="7" ry="9" fill="none" stroke="#333" stroke-width="1.5"/>
    <!-- Hanches -->
    <path d="M55,160 Q55,170 60,175 L88,178 L88,180 L112,180 L112,178 L140,175 Q145,170 145,160" fill="none" stroke="#333" stroke-width="1.8"/>
    <!-- Jambes -->
    <path d="M88,180 Q86,210 85,240" fill="none" stroke="#333" stroke-width="1.8"/>
    <path d="M85,240 Q84,256 83,268" fill="none" stroke="#333" stroke-width="1.8"/>
    <path d="M83,268 Q79,272 72,273 Q68,273 67,271" fill="none" stroke="#333" stroke-width="1.8"/>
    <path d="M112,180 Q114,210 115,240" fill="none" stroke="#333" stroke-width="1.8"/>
    <path d="M115,240 Q116,256 117,268" fill="none" stroke="#333" stroke-width="1.8"/>
    <path d="M117,268 Q121,272 128,273 Q132,273 133,271" fill="none" stroke="#333" stroke-width="1.8"/>
    <!-- Labels inversés vue dos: G à gauche, D à droite -->
    <text x="30" y="282" font-size="13" font-weight="bold" fill="#333">G</text>
    <text x="163" y="282" font-size="13" font-weight="bold" fill="#333">D</text>
  </g>

  <!-- ── Séparateur central ── -->
  <line x1="228" y1="20" x2="228" y2="280" stroke="#bbb" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- ── Titres ── -->
  <text x="130" y="8" font-size="9" fill="#666" text-anchor="middle">VUE DE FACE</text>
  <text x="350" y="8" font-size="9" fill="#666" text-anchor="middle">VUE DE DOS</text>
</svg>
