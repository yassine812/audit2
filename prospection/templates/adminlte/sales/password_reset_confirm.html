<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AB Serve | Confirm Password</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    /* Animated background elements */
    .bg-animation {
      position: absolute;
      width: 100%;
      height: 100%;
      overflow: hidden;
      z-index: 0;
    }

    .floating-shapes {
      position: absolute;
      width: 100px;
      height: 100px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 50%;
      animation: float 6s ease-in-out infinite;
    }

    .shape1 {
      top: 20%;
      left: 10%;
      animation-delay: 0s;
    }

    .shape2 {
      top: 60%;
      left: 80%;
      animation-delay: 2s;
      width: 80px;
      height: 80px;
    }

    .shape3 {
      top: 80%;
      left: 20%;
      animation-delay: 4s;
      width: 60px;
      height: 60px;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-20px) rotate(180deg); }
    }

    /* Main container */
    .login-container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      padding: 20px;
    }

    .login-card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 24px;
      padding: 40px;
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.1);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      animation: slideIn 0.6s ease-out;
    }

    .login-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 35px 70px rgba(0, 0, 0, 0.15);
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 40px;
    }

    .logo {
      font-size: 2.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, #667eea, #764ba2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    .subtitle {
      color: #6b7280;
      font-size: 1rem;
      font-weight: 500;
      margin-bottom: 10px;
    }

    .description {
      color: #9ca3af;
      font-size: 0.9rem;
      line-height: 1.5;
    }

    /* Form */
    .form-group {
      margin-bottom: 24px;
      position: relative;
    }

    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
      background: rgba(255, 255, 255, 0.8);
      border: 2px solid rgba(103, 126, 234, 0.1);
      border-radius: 12px;
      overflow: hidden;
      transition: all 0.3s ease;
    }

    .input-wrapper:focus-within {
      border-color: #667eea;
      box-shadow: 0 0 0 4px rgba(103, 126, 234, 0.1);
      transform: translateY(-2px);
    }

    .input-icon {
      padding: 16px;
      color: #9ca3af;
      font-size: 1.1rem;
      transition: color 0.3s ease;
    }

    .input-wrapper:focus-within .input-icon {
      color: #667eea;
    }

    .form-input {
      flex: 1;
      border: none;
      outline: none;
      font-size: 1rem;
      font-weight: 500;
      background: transparent;
      color: #374151;
    }

    .form-input::placeholder {
      color: #9ca3af;
      font-weight: 400;
    }

    /* Toggle password visibility */
    .toggle-password {
      padding: 16px;
      color: #9ca3af;
      cursor: pointer;
      transition: color 0.3s ease;
    }

    .toggle-password:hover {
      color: #667eea;
    }

    /* Submit button */
    .submit-btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
      margin-bottom: 24px;
    }

    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(103, 126, 234, 0.3);
    }

    .submit-btn:active {
      transform: translateY(0);
    }

    /* Loading animation */
    .submit-btn.loading {
      pointer-events: none;
    }

    .submit-btn.loading::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 20px;
      height: 20px;
      margin: -10px 0 0 -10px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top: 2px solid white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Error messages */
    .error-message {
      background: linear-gradient(135deg, #fee2e2, #fecaca);
      border: 1px solid #f87171;
      color: #dc2626;
      padding: 16px;
      border-radius: 12px;
      margin-bottom: 20px;
      font-size: 0.9rem;
      animation: shake 0.5s ease-in-out;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }

    .error-title {
      font-weight: 600;
      margin-bottom: 8px;
    }

    /* Footer link */
    .footer-link {
      text-align: center;
      margin-top: 24px;
    }

    .footer-link a {
      color: #667eea;
      text-decoration: none;
      font-weight: 500;
      transition: color 0.3s ease;
      position: relative;
    }

    .footer-link a:hover {
      color: #764ba2;
    }

    .footer-link a::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      width: 0;
      height: 2px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      transition: width 0.3s ease;
    }

    .footer-link a:hover::after {
      width: 100%;
    }

    /* Responsive */
    @media (max-width: 480px) {
      .login-container {
        max-width: 100%;
        padding: 15px;
      }

      .login-card {
        padding: 30px 20px;
      }

      .logo {
        font-size: 2rem;
      }
    }

    /* Success animation */
    .success-check {
      display: none;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: linear-gradient(135deg, #10b981, #059669);
      margin: 0 auto 20px;
      position: relative;
      animation: scaleIn 0.5s ease-out;
    }

    .success-check::after {
      content: '\f00c';
      font-family: 'Font Awesome 6 Free';
      font-weight: 900;
      color: white;
      font-size: 24px;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    @keyframes scaleIn {
      from { transform: scale(0); }
      to { transform: scale(1); }
    }
  </style>
</head>
<body>
  <div class="bg-animation">
    <div class="floating-shapes shape1"></div>
    <div class="floating-shapes shape2"></div>
    <div class="floating-shapes shape3"></div>
  </div>

  <div class="login-container">
    <div class="login-card">
      <div class="header">
        <div class="logo">
          <img src="{% static 'dist/img/abserveLogo.png' %}" alt="AB Serve" style="height:64px;width:auto;object-fit:contain;">
        </div>
        <h2 class="subtitle">Nouveau mot de passe</h2>
        <p class="description">Veuillez saisir votre nouveau mot de passe sécurisé</p>
      </div>

      <form method="post" id="passwordForm">
        <!-- CSRF Token placeholder -->
        <input type="hidden" name="csrfmiddlewaretoken" value="placeholder">
        
        <div class="form-group">
          <div class="input-wrapper">
            <i class="fas fa-lock input-icon"></i>
            <input 
              type="password" 
              class="form-input" 
              placeholder="Nouveau mot de passe" 
              name="new_password1" 
              id="password1"
              required
            >
            <i class="fas fa-eye toggle-password" onclick="togglePassword('password1', this)"></i>
          </div>
        </div>

        <div class="form-group">
          <div class="input-wrapper">
            <i class="fas fa-lock input-icon"></i>
            <input 
              type="password" 
              class="form-input" 
              placeholder="Confirmer le mot de passe" 
              name="new_password2" 
              id="password2"
              required
            >
            <i class="fas fa-eye toggle-password" onclick="togglePassword('password2', this)"></i>
          </div>
        </div>

        <!-- Error messages placeholder -->
        <div class="error-message" style="display: none;" id="errorMessage">
          <div class="error-title">Erreur !</div>
          <div id="errorContent"></div>
        </div>

        <button type="submit" class="submit-btn" id="submitBtn">
          <span>Changer le mot de passe</span>
        </button>
      </form>

      <div class="footer-link">
        <a href="#" onclick="goToLogin()">
          <i class="fas fa-arrow-left" style="margin-right: 8px;"></i>
          Retour à la connexion
        </a>
      </div>
    </div>
  </div>

  <script>
    // Toggle password visibility
    function togglePassword(inputId, icon) {
      const input = document.getElementById(inputId);
      const isPassword = input.type === 'password';
      
      input.type = isPassword ? 'text' : 'password';
      icon.className = isPassword ? 'fas fa-eye-slash toggle-password' : 'fas fa-eye toggle-password';
    }

    // Form submission with loading animation
    document.getElementById('passwordForm').addEventListener('submit', function(e) {
      const submitBtn = document.getElementById('submitBtn');
      const btnText = submitBtn.querySelector('span');
      
      // Add loading state
      submitBtn.classList.add('loading');
      btnText.style.opacity = '0';
      
      // Simulate form validation
      const password1 = document.getElementById('password1').value;
      const password2 = document.getElementById('password2').value;
      
      if (password1 !== password2) {
        e.preventDefault();
        showError('Les mots de passe ne correspondent pas.');
        resetButton();
        return;
      }
      
      if (password1.length < 8) {
        e.preventDefault();
        showError('Le mot de passe doit contenir au moins 8 caractères.');
        resetButton();
        return;
      }
      
      // In a real scenario, this would be handled by Django
      setTimeout(() => {
        resetButton();
        showSuccess();
      }, 2000);
      
      e.preventDefault(); // Remove this in production
    });

    function resetButton() {
      const submitBtn = document.getElementById('submitBtn');
      const btnText = submitBtn.querySelector('span');
      
      submitBtn.classList.remove('loading');
      btnText.style.opacity = '1';
    }

    function showError(message) {
      const errorDiv = document.getElementById('errorMessage');
      const errorContent = document.getElementById('errorContent');
      
      errorContent.innerHTML = `<p>${message}</p>`;
      errorDiv.style.display = 'block';
      
      setTimeout(() => {
        errorDiv.style.display = 'none';
      }, 5000);
    }

    function showSuccess() {
      const card = document.querySelector('.login-card');
      card.innerHTML = `
        <div class="header">
          <div class="success-check" style="display: block;"></div>
          <h2 class="subtitle">Mot de passe modifié !</h2>
          <p class="description">Votre mot de passe a été mis à jour avec succès.</p>
        </div>
        <div class="footer-link">
          <a href="#" onclick="goToLogin()">
            <i class="fas fa-sign-in-alt" style="margin-right: 8px;"></i>
            Se connecter
          </a>
        </div>
      `;
    }

    function goToLogin() {
      window.location.href = "{% url 'prospection:login' %}";
    }

    // Add smooth focus transitions
    document.querySelectorAll('.form-input').forEach(input => {
      input.addEventListener('focus', function() {
        this.parentElement.style.transform = 'translateY(-2px)';
      });
      
      input.addEventListener('blur', function() {
        if (!this.value) {
          this.parentElement.style.transform = 'translateY(0)';
        }
      });
    });

    // Add password strength indicator
    document.getElementById('password1').addEventListener('input', function() {
      const password = this.value;
      const wrapper = this.parentElement;
      
      let strength = 0;
      if (password.length >= 8) strength++;
      if (/[A-Z]/.test(password)) strength++;
      if (/[0-9]/.test(password)) strength++;
      if (/[^A-Za-z0-9]/.test(password)) strength++;
      
      const colors = ['#ef4444', '#f97316', '#eab308', '#22c55e'];
      const color = colors[Math.min(strength - 1, 3)] || '#ef4444';
      
      if (password.length > 0) {
        wrapper.style.borderColor = color;
      }
    });
  </script>
</body>
</html>
