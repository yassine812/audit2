<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AB Serve | Mot de passe défini avec succès</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    /* Animated background elements */
    .bg-animation {
      position: absolute;
      width: 100%;
      height: 100%;
      overflow: hidden;
      z-index: 0;
    }

    .floating-elements {
      position: absolute;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 50%;
      animation: float 8s ease-in-out infinite;
    }

    .element1 {
      width: 120px;
      height: 120px;
      top: 15%;
      left: 15%;
      animation-delay: 0s;
    }

    .element2 {
      width: 80px;
      height: 80px;
      top: 70%;
      right: 20%;
      animation-delay: 3s;
    }

    .element3 {
      width: 100px;
      height: 100px;
      bottom: 20%;
      left: 10%;
      animation-delay: 6s;
    }

    .element4 {
      width: 60px;
      height: 60px;
      top: 30%;
      right: 10%;
      animation-delay: 2s;
    }

    @keyframes float {
      0%, 100% { 
        transform: translateY(0px) translateX(0px) rotate(0deg); 
        opacity: 0.7;
      }
      33% { 
        transform: translateY(-30px) translateX(20px) rotate(120deg); 
        opacity: 1;
      }
      66% { 
        transform: translateY(20px) translateX(-20px) rotate(240deg); 
        opacity: 0.8;
      }
    }

    /* Particles effect */
    .particles {
      position: absolute;
      width: 4px;
      height: 4px;
      background: rgba(255, 255, 255, 0.6);
      border-radius: 50%;
      animation: particles 10s linear infinite;
    }

    .particle1 { top: 20%; left: 25%; animation-delay: 0s; }
    .particle2 { top: 40%; left: 75%; animation-delay: 2s; }
    .particle3 { top: 60%; left: 15%; animation-delay: 4s; }
    .particle4 { top: 80%; left: 85%; animation-delay: 6s; }
    .particle5 { top: 10%; left: 60%; animation-delay: 8s; }

    @keyframes particles {
      0% { transform: translateY(0px); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(-100vh); opacity: 0; }
    }

    /* Main container */
    .success-container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 450px;
      padding: 20px;
    }

    .success-card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(25px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 28px;
      padding: 15px 40px;
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.15);
      text-align: center;
      animation: slideInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
      position: relative;
      overflow: hidden;
    }

    .success-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, #667eea, #764ba2, #34d399);
      animation: shimmer 2s ease-in-out infinite;
    }

    @keyframes shimmer {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }

    @keyframes slideInUp {
      from {
        opacity: 0;
        transform: translateY(60px) scale(0.9);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    /* Success icon */
    .success-icon {
      width: 120px;
      height: 120px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      border-radius: 50%;
      margin: 0 auto 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      animation: successPulse 2s ease-in-out infinite;
      box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4);
    }

    @keyframes successPulse {
      0% {
        box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4);
        transform: scale(1);
      }
      50% {
        box-shadow: 0 0 0 20px rgba(16, 185, 129, 0);
        transform: scale(1.05);
      }
      100% {
        box-shadow: 0 0 0 0 rgba(16, 185, 129, 0);
        transform: scale(1);
      }
    }

    .success-icon i {
      color: white;
      font-size: 3rem;
      animation: checkmark 0.6s ease-in-out 0.8s both;
    }

    @keyframes checkmark {
      0% {
        transform: scale(0) rotate(-45deg);
        opacity: 0;
      }
      50% {
        transform: scale(1.2) rotate(-45deg);
        opacity: 1;
      }
      100% {
        transform: scale(1) rotate(0deg);
        opacity: 1;
      }
    }

    /* Content */
    .logo {
      font-size: 2.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, #667eea, #764ba2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 20px;
      animation: logoFloat 3s ease-in-out infinite;
    }

    @keyframes logoFloat {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-5px); }
    }

    .success-title {
      font-size: 1.8rem;
      font-weight: 700;
      color: #1f2937;
      margin-bottom: 16px;
      line-height: 1.2;
    }

    .success-message {
      font-size: 1.1rem;
      color: #6b7280;
      line-height: 1.6;
      margin-bottom: 40px;
      max-width: 320px;
      margin-left: auto;
      margin-right: auto;
    }

    /* Action button */
    .login-button {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      text-decoration: none;
      padding: 16px 32px;
      border-radius: 16px;
      font-size: 1.1rem;
      font-weight: 600;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 8px 25px rgba(16, 185, 129, 0.3);
      position: relative;
      overflow: hidden;
    }

    .login-button::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
      transition: left 0.5s;
    }

    .login-button:hover::before {
      left: 100%;
    }

    .login-button:hover {
      transform: translateY(-3px) scale(1.02);
      box-shadow: 0 15px 35px rgba(16, 185, 129, 0.4);
      color: white;
      text-decoration: none;
    }

    .login-button:active {
      transform: translateY(-1px) scale(0.98);
    }

    .login-button i {
      font-size: 1.2rem;
      transition: transform 0.3s ease;
    }

    .login-button:hover i {
      transform: translateX(3px);
    }

    /* Secondary info */
    .info-box {
      background: rgba(16, 185, 129, 0.05);
      border: 1px solid rgba(16, 185, 129, 0.1);
      border-radius: 16px;
      padding: 20px;
      margin: 30px 0;
      position: relative;
    }

    .info-box::before {
      content: '\f05a';
      font-family: 'Font Awesome 6 Free';
      font-weight: 900;
      position: absolute;
      top: -12px;
      left: 20px;
      background: rgba(16, 185, 129, 0.1);
      color: #764ba2;
      padding: 8px;
      border-radius: 50%;
      font-size: 0.9rem;
    }

    .info-text {
      color: #374151;
      font-size: 0.95rem;
      line-height: 1.5;
      margin-top: 8px;
    }

    /* Confetti animation */
    .confetti {
      position: absolute;
      width: 6px;
      height: 6px;
      background: #fbbf24;
      animation: confetti 3s ease-in-out infinite;
    }

    .confetti:nth-child(1) { 
      left: 10%; 
      animation-delay: 0s; 
      background: #ef4444;
    }
    .confetti:nth-child(2) { 
      left: 20%; 
      animation-delay: 0.5s; 
      background: #3b82f6;
    }
    .confetti:nth-child(3) { 
      left: 30%; 
      animation-delay: 1s; 
      background: #667eea;
    }
    .confetti:nth-child(4) { 
      left: 40%; 
      animation-delay: 1.5s; 
      background: #8b5cf6;
    }
    .confetti:nth-child(5) { 
      left: 50%; 
      animation-delay: 2s; 
      background: #f59e0b;
    }
    .confetti:nth-child(6) { 
      left: 60%; 
      animation-delay: 0.3s; 
      background: #ef4444;
    }
    .confetti:nth-child(7) { 
      left: 70%; 
      animation-delay: 0.8s; 
      background: #06b6d4;
    }
    .confetti:nth-child(8) { 
      left: 80%; 
      animation-delay: 1.3s; 
      background: #84cc16;
    }
    .confetti:nth-child(9) { 
      left: 90%; 
      animation-delay: 1.8s; 
      background: #f97316;
    }

    @keyframes confetti {
      0% {
        transform: translateY(-100vh) rotate(0deg);
        opacity: 1;
      }
      100% {
        transform: translateY(100vh) rotate(360deg);
        opacity: 0;
      }
    }

    /* Responsive */
    @media (max-width: 480px) {
      .success-container {
        max-width: 100%;
        padding: 10px;
      }

      .success-card {
        padding: 15px 25px;
        border-radius: 24px;
      }

      .logo {
        font-size: 2rem;
      }

      .success-title {
        font-size: 1.5rem;
      }

      .success-icon {
        width: 100px;
        height: 100px;
      }

      .success-icon i {
        font-size: 2.5rem;
      }
    }
  </style>
</head>
<body>
  <div class="bg-animation">
    <!-- Floating elements -->
    <div class="floating-elements element1"></div>
    <div class="floating-elements element2"></div>
    <div class="floating-elements element3"></div>
    <div class="floating-elements element4"></div>
    
    <!-- Particles -->
    <div class="particles particle1"></div>
    <div class="particles particle2"></div>
    <div class="particles particle3"></div>
    <div class="particles particle4"></div>
    <div class="particles particle5"></div>
    
    <!-- Confetti -->
    <div class="confetti"></div>
    <div class="confetti"></div>
    <div class="confetti"></div>
    <div class="confetti"></div>
    <div class="confetti"></div>
    <div class="confetti"></div>
    <div class="confetti"></div>
    <div class="confetti"></div>
    <div class="confetti"></div>
  </div>

  <div class="success-container">
    <div class="success-card">
      <div class="logo">AB Serve</div>
      
      <div class="success-icon">
        <i class="fas fa-check"></i>
      </div>
      
      <h1 class="success-title">Parfait !</h1>
      
      <p class="success-message">
        Votre mot de passe a été défini avec succès. Vous pouvez maintenant vous connecter à votre compte.
      </p>
      
      <div class="info-box">
        <p class="info-text">
          <strong>Sécurité renforcée :</strong> Votre compte est maintenant protégé par votre nouveau mot de passe sécurisé.
        </p>
      </div>
      
      <a href="#" class="login-button" onclick="goToLogin()">
        <i class="fas fa-sign-in-alt"></i>
        <span>Se connecter maintenant</span>
      </a>
    </div>
  </div>

  <script>
    function goToLogin() {
      window.location.href = "{% url 'prospection:login' %}";
    }

    // Start countdown after page load
    window.addEventListener('load', () => {
      setTimeout(updateButton, 3000); // Start countdown after 3 seconds
    });

    // Add entrance animation delay
    window.addEventListener('load', () => {
      const card = document.querySelector('.success-card');
      card.style.opacity = '0';
      card.style.transform = 'translateY(60px) scale(0.9)';
      
      setTimeout(() => {
        card.style.transition = 'all 0.8s cubic-bezier(0.16, 1, 0.3, 1)';
        card.style.opacity = '1';
        card.style.transform = 'translateY(0) scale(1)';
      }, 200);
    });

    // Add celebration sound effect (optional)
    function playCelebrationSound() {
      // You can add a subtle sound effect here if desired
      // const audio = new Audio('path/to/success-sound.mp3');
      // audio.volume = 0.3;
      // audio.play().catch(() => {}); // Ignore errors if sound fails
    }

    // Trigger celebration on load
    window.addEventListener('load', () => {
      setTimeout(playCelebrationSound, 1000);
    });

    // Add subtle hover effects to the entire card
    const card = document.querySelector('.success-card');
    card.addEventListener('mouseenter', () => {
      card.style.transform = 'translateY(-5px) scale(1.02)';
      card.style.boxShadow = '0 40px 80px rgba(0, 0, 0, 0.2)';
    });

    card.addEventListener('mouseleave', () => {
      card.style.transform = 'translateY(0) scale(1)';
      card.style.boxShadow = '0 30px 60px rgba(0, 0, 0, 0.15)';
    });
  </script>
</body>
</html>
