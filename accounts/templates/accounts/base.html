{% extends "base_global.html" %}
{% load static %}

{% block extra_css %}
<style>
/* ── Filter sidebar ──────────────────────────────────────────────── */
.filter-sidebar {
  position: fixed; top: 0; right: -360px; width: 320px;
  height: 100vh; background: #fff; z-index: 1055;
  overflow: hidden; transition: right .3s ease;
  box-shadow: -6px 0 24px rgba(0,0,0,.18);
  display: flex; flex-direction: column;
}
.filter-sidebar.open { right: 0; }

.filter-sidebar-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 1rem 1.25rem; background: #343a40; color: #fff;
  font-size: .95rem; font-weight: 600; flex-shrink: 0;
}
.filter-sidebar-header .close-btn {
  background: transparent; border: 1px solid rgba(255,255,255,.4);
  color: #fff; border-radius: 4px; padding: 2px 8px;
  cursor: pointer; font-size: 1rem; line-height: 1.4;
  transition: background .2s;
}
.filter-sidebar-header .close-btn:hover { background: rgba(255,255,255,.15); }

.filter-sidebar-body {
  flex: 1; overflow-y: auto; padding: 1.25rem;
}

.filter-group { margin-bottom: 1.1rem; }
.filter-label {
  display: block; font-size: .72rem; font-weight: 700;
  text-transform: uppercase; letter-spacing: .05em;
  color: #6c757d; margin-bottom: .35rem;
}
.filter-group .form-control,
.filter-group .form-control-sm { font-size: .875rem; }

.filter-actions {
  padding-top: .75rem; border-top: 1px solid #dee2e6; margin-top: .5rem;
}

/* ── Overlay ─────────────────────────────────────────────────────── */
.filter-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.45); z-index: 1050;
}
.filter-overlay.active { display: block; }

/* ── Bouton fixe ─────────────────────────────────────────────────── */
.filter-toggle-btn {
  position: fixed; right: 16px; top: 50%;
  transform: translateY(-50%); z-index: 1060;
  width: 46px; height: 46px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  padding: 0; writing-mode: horizontal-tb;
  box-shadow: 0 4px 14px rgba(0,0,0,.3);
  transition: transform .2s;
}
.filter-toggle-btn:hover { transform: translateY(-50%) scale(1.08); }
</style>
{% endblock %}

{% block content %}
{% block admin_content %}{% endblock %}
{% endblock %}

{% block extra_js %}
<script>
(function () {
  const sidebar  = document.getElementById('filterSidebar');
  const overlay  = document.getElementById('filterOverlay');
  const toggleBtn= document.getElementById('filterToggleBtn');
  if (!sidebar) return;

  function open()  { sidebar.classList.add('open');    overlay.classList.add('active'); }
  function close() { sidebar.classList.remove('open'); overlay.classList.remove('active'); }

  if (toggleBtn) toggleBtn.addEventListener('click', open);
  if (overlay)   overlay.addEventListener('click', close);
  const closeBtn = sidebar.querySelector('.close-btn');
  if (closeBtn)  closeBtn.addEventListener('click', close);
})();
</script>
{% block page_scripts %}{% endblock %}
{% endblock %}{# extra_js #}
