{% extends 'base_global.html' %}

{% block extra_css %}
{{ block.super }}
<style>
  .gd-shell {
    background: linear-gradient(180deg, #f5f7fb 0%, #eef2f8 100%);
    border-radius: 14px;
    padding: 1.25rem;
  }
  .gd-card {
    border: 1px solid #dfe6f5;
    border-radius: 14px;
    background: #fff;
    box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
  }
  .gd-toolbar { display:flex; gap:.5rem; align-items:center; flex-wrap:wrap; }
  .gd-breadcrumb { display:flex; gap:.4rem; align-items:center; flex-wrap:wrap; font-size:.9rem; }
  .gd-folder {
    display:flex; align-items:center; gap:.8rem; padding:.9rem 1rem;
    color:#24324a; border:1px solid #dfe6f5; border-radius:10px; background:#fff;
  }
  .gd-folder:hover { color:#1d4ed8; border-color:#93b4ef; text-decoration:none; }
  .gd-folder i { color:#e4a11b; font-size:1.35rem; }
  .gd-empty { padding:3.5rem 1rem; text-align:center; color:#64748b; }
  .gd-empty i { display:block; font-size:2.4rem; margin-bottom:.8rem; color:#a8b4c7; }
  .access-role-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
    gap: .7rem;
  }
  .access-role-card {
    display: flex;
    align-items: center;
    gap: .7rem;
    min-height: 54px;
    margin: 0;
    padding: .8rem .9rem;
    border: 1px solid #dbe4f1;
    border-radius: 10px;
    background: #fff;
    color: #334155;
    cursor: pointer;
    transition: .15s ease;
  }
  .access-role-card:hover { border-color: #8eb2ef; background: #f7faff; }
  .access-role-card:has(input:checked) {
    border-color: #3b82f6;
    background: #eff6ff;
    color: #1d4ed8;
    box-shadow: 0 0 0 1px #3b82f6;
  }
  .access-role-card input { width: 17px; height: 17px; margin: 0; flex: none; }
  .access-role-card i { width: 20px; text-align: center; color: #64748b; }
  .access-role-card:has(input:checked) i { color: #2563eb; }
  .access-scope-card {
    height: 100%;
    padding: 1rem;
    border: 1px solid #dbe4f1;
    border-radius: 12px;
    background: #fbfcfe;
  }
  .access-scope-title { display:flex; align-items:center; gap:.55rem; margin-bottom:.25rem; font-weight:700; color:#334155; }
  .access-scope-help { min-height: 34px; margin-bottom:.65rem; color:#718096; font-size:.78rem; }
  .access-scope-card select { width:100%; min-height:132px; border-radius:8px; }
  .access-scope-card select option { padding:.35rem .5rem; }
  .folder-color-input { width:72px; height:44px; padding:.2rem; border:1px solid #cfd8ea; border-radius:9px; background:#fff; cursor:pointer; }
  .access-toggle { width:19px; height:19px; cursor:pointer; }
  .section-icon { width:42px; height:42px; border-radius:11px; background:#edf4ff; color:#2563eb; display:grid; place-items:center; flex:none; }
  .access-switch { display:flex; align-items:center; justify-content:space-between; gap:1rem; padding:1rem; border:1px solid #dbe4f1; border-radius:12px; background:#f8fafc; }
  .preview-modal-content { height:min(88vh,900px); overflow:hidden; border:0; border-radius:16px; box-shadow:0 24px 80px rgba(15,23,42,.24); }
  .preview-modal-content .modal-body { position:relative; min-height:420px; background:#eef2f7; }
  #filePreviewFrame { width:100%; height:100%; min-height:calc(min(88vh,900px) - 78px); border:0; background:#fff; }
  .preview-loader { position:absolute; inset:0; z-index:2; display:grid; place-items:center; align-content:center; color:#526078; background:#f4f7fb; }
  .gd-title {
    margin: 0;
    color: #1f2a44;
    font-weight: 700;
    font-size: 1.4rem;
  }
  .gd-subtitle {
    color: #6b7280;
    margin: .35rem 0 0;
  }
  .status-badge {
    border-radius: 999px;
    padding: .36rem .7rem;
    font-size: .76rem;
    font-weight: 700;
    border: 1px solid transparent;
  }
  .status-brouillon { background: #fff7ed; color: #9a3412; border-color: #fed7aa; }
  .status-en_verification { background: #eff6ff; color: #1d4ed8; border-color: #bfdbfe; }
  .status-en_approbation { background: #f5f3ff; color: #6d28d9; border-color: #ddd6fe; }
  .status-applicable { background: #ecfdf3; color: #166534; border-color: #bbf7d0; }
  .status-archive { background: #f8fafc; color: #475569; border-color: #cbd5e1; }
  .status-supprime { background: #fef2f2; color: #b91c1c; border-color: #fecaca; }
  .gd-form-control {
    border-radius: .7rem;
    border: 1px solid #cfd8ea;
    min-height: 42px;
  }
  .gd-form-control:focus {
    border-color: #1d4ed8;
    box-shadow: 0 0 0 .2rem rgba(29, 78, 216, .14);
  }
  .gd-form-label {
    margin-bottom: .45rem;
    color: #334155;
    font-size: .84rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .03em;
  }
  .required-label::after {
    content: " *";
    color: #dc2626;
    font-weight: 800;
  }
  @media (max-width: 767px) {
    .gd-shell { padding: .85rem; }
  }
</style>
{% endblock %}
