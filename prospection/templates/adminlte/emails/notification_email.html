<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nouvelle notification</title>
    <style type="text/css">
        body {
            font-family: 'Source Sans Pro', 'Helvetica Neue', Arial, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 0;
            color: #444;
        }
        .email-container {
            max-width: 600px;
            margin: 20px auto;
            background: #ffffff;
            border-radius: 5px;
            overflow: hidden;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .email-header {
            background-color: #3c8dbc;
            color: white;
            padding: 20px;
            text-align: center;
        }
        .email-body {
            padding: 20px;
        }
        .notification-card {
            background: #f9f9f9;
            border-left: 4px solid #3c8dbc;
            padding: 15px;
            margin-bottom: 20px;
        }
        .btn {
            display: inline-block;
            padding: 10px 20px;
            background-color: #3c8dbc;
            color: white !important;
            text-decoration: none;
            border-radius: 3px;
            margin-top: 15px;
        }
        .email-footer {
            text-align: center;
            padding: 15px;
            font-size: 12px;
            color: #999;
            background-color: #f4f4f4;
        }
        .logo {
            max-height: 50px;
            margin-bottom: 15px;
        }
        h1 {
            margin: 0 0 10px 0;
            font-size: 24px;
        }
        p {
            margin: 0 0 10px 0;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div class="email-container">
        <div class="email-header">
            <h1>Nouvelle notification</h1>
        </div>
        
        <div class="email-body">
            <p>Bonjour <strong>{{ username }}</strong>,</p>
            <p>Vous avez reçu une nouvelle notification :</p>
            
            <div class="notification-card">
                <p>{{ message }}</p>
            </div>
            
            <p style="margin-top: 20px;">
                Cordialement,<br>
                L'équipe AB Serve Group
            </p>
        </div>
        
        <div class="email-footer">
            <p>
                © {% now "Y" %} AB Serve Group. Tous droits réservés.<br>
            </p>
        </div>
    </div>
</body>
</html>
