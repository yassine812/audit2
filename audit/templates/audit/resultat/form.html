{% extends 'audit/base.html' %}
{% block title %}Modifier résultat{% endblock %}
{% block content %}
<div class="card card-outline card-primary">
  <div class="card-header"><h3 class="card-title">Mise à jour du résultat</h3></div>
  <div class="card-body">
    <form method="post">{% csrf_token %}
      {{ form.as_p }}
      <div class="form-actions-right">
        <button class="btn btn-primary">Enregistrer</button>
        <a href="{% url 'audit:resultat-detail' object.pk %}" class="btn btn-secondary">Retour</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
